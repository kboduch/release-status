name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8

      - run: uv sync

      - name: Type check
        run: uv run mypy src/

      - name: Tests
        run: uv run pytest -v
